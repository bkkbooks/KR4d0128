body:
  text: 劉左史集卷二宋劉安節撰墓志宋國寶墓志銘永嘉宋君國寶既殁之明年卜以九月甲申葬於郡西寶塘原前期弟某狀君行以書抵辟雍録張輝子充曰某不悌不能恭厥兄天降之罰以不畀於我家今葬有日儻不得賢者銘以圖不朽是重某不悌之罪也况兄於今監察御史劉君厚而執事劉所敬也若因執事以請必得銘一日子充詣余致其言且曰若國寶銘無愧矣余既知君又重違子充之請遂序而銘之君諱之珍國寶其字也先生九嵗喪其父家貧能自謀學不為異業奪比長益砥礪為節行非其義不以一毫挫於人謹身約用以取給有餘輒頒其兄弟之貧者平居不妄言笑不以色假人人若不可得而親至所與交必傾倒為之盡情骨清氣肅望之可知其人也年三十六始以進士選為台州司理參軍有告坑户疑其匿官白金者不實法應杖吏受賕欲置之流君曰在法告不稱疑雖不治可也而反坐之耶固爭之壓之勢竟不為變獄無小必躬閲不専諉胥吏所平反者甚衆嵗餘丁母憂徒跣扶柩旋葬某鄉偹極哀瘁廬於墓者三年服除調應天府穀孰縣尉所部民兵獲強盜或請以躬捕為名可增秩君曰以欺冒賞不忍為也弗聼初君嘗上書言事坐是齟齬不進故再尉㑹稽越俗率以春月競渡其費用一切皆官為取之民嵗病其擾而在位者茍覬娛嬉方務極奢侈府丞意喻諸邑邑例以尉皆辦至君獨詣府條其不可者三一府閧然皆為君難之君不顧其事訖不行大觀三年詔削黨籍君曰吾罪滌矣庶幾伸其志者明年夏至京師以五月丙辰卒於逆旅享年五十二君性徑持義不茍所當為必挺然以身先至於不可介如也不以貴賤貧富大小衆寡二其操其居家也動以法自律如在官府其在官府也事無細不察如居家焉雖勤瘁不以為病未嘗求知於人人亦鮮能知君者卒無愧恨意曰義如是如是足矣又何求自初任至殁幾至二十年而官止於此故其事業不甚著見於世識者哀之曽祖諱某祖諱某父諱某君娶陳氏生男四人曰敦仁敦義敦禮敦信皆修進士業女三人皆嫁士人季未行其葬也實從母夫人兆其年改元政和銘曰介而通察而恕儉而能施勤而不怨在位常患不得若人而用之而若人者又卒不偶以死其命也耶祭文祭壻立之嗚呼余與汝家世為婚姻故復以女託汝終身如何五年有子二人一初學語一方在袵汝遂往矣彼將誰親嗚呼哀哉豫復何言瀝酒告誠涕淚潺湲代薛承奉祭立之女子之生於人是倚嫁也倚夫夫沒倚子嗟爾母兮初喪爾父家事多難將子是付子復往矣母將疇依二弟尚幼嗚呼母悲嗟我曩時婚嫁初畢謂已無纍笑傲終日如何至今百纍猶存皤然之翁而哭諸孫嗚呼老矣為纍滋多未化之身為之奈何代貫道祭姪立之天禍我家降生百殃嵗在癸酉我兄蚤亡期月之間再罹父喪今汝又往使我重傷憶昨與汝侍翁之側誨言從容汝有倦色翁曰往哉汝其歸息年未及壯已入老境且能久乎有嗣為幸時余與汝雖聞此言親親之心亦冀不然孰謂今日天不汝假追念疇昔我淚如㵼嗚呼哀哉人孰不死汝為不遐人亦有天汝為可嗟汝母斑白汝兒咿哇汝弟汝妹曰未室家逝去之夕對我欲語氣出如線幾不能吐余曰吁哉其屬我親豫豈敢忘猶有鬼神頷以應我去無及矣骨肉在旁環其泣矣嗚呼哀哉汝其無可奈何兮豫亦無奈汝何兮立之移喪路祭聞諸古人喪先逺日豈便於生惟死是恤子之云亡日近三七肉未及寒輿置他室抑又聞之子之於親惟命是行豈其死也而異於生吾親為寧亦子之情往以安之勿怖勿驚祭丁逢辰嗟我逢辰名家以儒不詭方士不師浮屠獨抱六經以恢聖謨曰異此者則非我徒翕然髙門不戒而孚子如其父妻如其夫言不茍發行不茍趨咸謂長者信哉匪誣越嵗戊辰闢多士塗羣舉經行以公應書事乃中沮賢網之踈臨川太息失吞舟魚公曰命也歸與歸與笑指東郊先子舊廬詩書可樂琴瑟可娛盍往葺焉豫將隱居命二三子無棄是圖以講以問則余與俱季也早達調官海隅綵服從侍式歡有餘天不相人冢子云殂慈懷孔傷積憂成愈竟以不救吁亡矣夫嗚呼哀哉日逝月徂窀穸告期永隔幽墟曽是婚姻君之葭莩今此長往心焉何如侑祭以文君其知乎祭吳助教天之降才非徒生之人之負材終有一施昔者范蠡霸王之師進饒於功退饒於資惟公之初家事未治日與其季出謀所為不有倦者孰營余私汝盍往學余為汝資舟車所通水泛陸馳閲嵗幾何各獲其期季以學顯公以幹推俱爵於朝同功異宜亦既知足幡然改思卜居東嘉飬氣自怡剛直有禮信而不疑嵗推其餘以畀宗支鄉黨族屬服其義慈咸謂五福有全不虧嗟公平生未嘗丐醫一旦遘疾乃久弗支逝去之辰神魂欲離猶能晏然與諸孤辭嗚呼夀矣夫復何悲惟是鄰里遊從有時載燕載笑既相諧熙願託婚姻以永不衰通好未幾公疾已危遽云逝矣迅弗可追再拜柩前奠此一巵想公精神死猶有知祭王正翁嗟嗟正翁而遽然耶其一去而終不復返也耶昔公之赴官臨川也豫往江心孤嶼餞之曰公仕矣且去鄉里其亦有私事未集者乎豫不敏願置力焉公曰吾仕矣又何求然吾他日歸顧未有廬可居者公愛我盍為我營之豫曰唯唯公既就道余惟命匠治宫室室且成公亦代有日豫固蚤夜望公之歸以寧其居也而乃殁於中道也耶其託我以居居成而不得寢處之也嗚呼哀哉是月也公之子將以公之柩葬於西岑之原故悼公之不復見也敬侍母親往以薄奠祭公於新居之正寢惟公有知其聼斯文以審我哀祭方積中昔公妙齡秉筆學文朝謂白屋暮而青雲如何十年挾冊求仕抱璞以泣蔑然知巳我初見公謂才可求公亦自信學以日修逮其不遇謂命之使公亦自疑學其已矣吁嗟人生各有所營退必獲利進必獲名公之營身豈云不力云胡二者而亡一得我意天理否久則通曷有如公竟坐此窮天不可知才不可恃公之長才命止斯爾日沒復出公歸不還登公之堂莫承公顔我酒既清我肴既潔哀以送之終天之訣為林思亷祭林介夫大道之行維國求賢往往其君擁篲以先後世多私維賢求國俯首有司以幸一得偉哉先生則異於是曰豫之學初不為利胡為去親千里决科丐祿升斗其獲幾何出耕東臯入奉北堂夫豈無他而行一鄉孟子居齊國人矜式王通河汾訟者自息施於有政是亦正人奚其有為先辱其身維此麟經將聖之志諸儒盾矛莫䆒厥義微發大㫖析其異同一時諸公捨已請從嗟余晚學實愚不肖曽謂先生肯賜之教誨我諭我謂我宗盟勉我以學忘其不能維是頑庸莫堪鞭策先生之教夫敢不力尚期終身佩服不遺如何中年天奪之師嗚呼哀哉自今以往凡我小子孰勸孰奬考日惟良葬車東馳訣祭一觴誰知我悲祭陳八夫人昔我伯姊首歸諸陳不竟其夀卒從夫人夫人之初適於夏氏有子而妻實我兄子陳為吾姊夏為吾姻眷好之再敦夫人親嗚呼哀哉昔我佳節拜夫人夀今也則亡來哭其柩我酒既酌我殽既陳聊以祭之嗚呼夫人又嗚呼夫人而命然乎前年之春實喪厥夫靈柩在堂未先大葬如何夫人亦繼而喪嗚呼哀哉室家堂堂惟君子經之營之實夫人爾承之嗚呼今其往矣將誰使承之惟夫人有知其福爾子孫以慰我親姻之思青詞為子孫保安設醮天聽雖髙不疾而逺日監在下有感必通頃緣賤息之負痾嘗瀝丹誠而叙懇賴神之賜厥疾有瘳是涓嘉辰共陳法㑹玉虛金闕仰投蕞爾之誠風馬雲車想見翻然而下有酒維㫖有椒維馨雖籩豆甚微物無以稱者然精誠所至神其吐之乎經義達瑞節同度量成牢禮同數器修法則立法而授之侯者王也奉法而施之民者侯也先王之於諸侯列之爵分之土豈私厚之哉代王行法於是乎在然而人之情也逺則昜恣法之行也久則或弊以昜恣之人奉或弊之法茍不有人以稽正之則禮法亂於僭擬法度壞於因循異政殊俗莫之統一而先王所恃以維持天下者將不幾於廢弛乎是故周官之制每於十一嵗之久必使行人之官以巡天下之邦國達瑞節同度量成牢禮同數器修法則者凡以考正諸侯之治故也蓋瑞以合驗節以示信而用之交四鄰者也度以度長短量以量多寡而用之以平百物者也牢禮者若行人禮九牢之類用之以禮賓者也數器者若典命各㫝其命之數用之以為儀者也法則凡制而用之者也則則凡揆而制之者也夫邦國之地封疆百里比之王畿雖曰壤地褊小然所以交四鄰平百物外之禮賓內之飭已與夫制而用之揆而制之一皆有賴於數者之法一法不舉弊之源也則欲撫於邦國者可不考而正之哉何則瑞節所以為交也瑞非其瑞則朝㑹有辭節非其節則門關有禁而邦交有不達之國矣今也六瑞之用辨其圭璧六節之物異其金竹所以達之也度量以為平也布帛長短同而度不相若五穀多寡同而量不相若則童子有適市之欺矣今也五度之則正其分寸五量之容辨其籥合所以同之也牢禮之具所以禮賓也諸侯九牢則疑於公而不成其為侯矣子男七牢則疑於伯而不成其為子男矣今也牢以命而為之禮使之無虧焉所以成之也數器之節所以辨等也侯伯以七為節而僣於九則異於侯伯之禮矣子男以五為節而僣於七則異於子男之禮矣今也器以命而為之數使之無異焉所以同之也道與時變法隨俗昜昔之所成今見其虧昔之所得今見其失虧者補之失者救之此法則之損益有不可已者所以修之也瑞節也度量也牢禮也數器也此法之大常所不可得而變昜也故逹之成之同之法則也此法之小變所可得而損益也故修之大常者使之同而不可踰所以存法之善小變者與之修而無弊所以救法之失一常一變而邦國之法盡在是矣孔子曰謹權量審法度四方之政行焉此之謂也雖然先王之撫邦國豈一日之積哉存省及於五嵗則察而治之者既至於三矣書命及於九嵗則諭而協之者又至再矣猶以為未也於是有十一嵗之考考之悉矣於是十二嵗之巡守察之不若諭之為益諭之不若考之為詳考之不若巡守之為大故自修法則而上行人之事也至於巡守則王往治焉此先後詳略之序也然王之巡守非可遽治也是必行人考之於先然後王乃巡之於後考之於先不為慢令巡之於後不為罔人是故變禮樂而不從者可得而流之也革制度而為叛者可得而討之也討流之罪重矣而先王行之不憚者亦有行人蚤正其事而已矣是以王者之治至簡而詳至約而博有功諸侯莫不各謹爾度以承天休無或亂常以干先王之誅書曰惟周王撫萬邦巡侯甸四征不庭綏厥兆民此其致治之效也雖然同律度量衡修五禮五玉此舜巡狩之日也而周官之制乃使行人考於前期之一嵗何哉蓋帝者之政富於德儀物少而用度省則巡之五嵗為已數矣王者之政富於業儀物多而用度費則巡之十二為已疏矣數者昜治疏者難察則行人蚤正其事以為之先尤周政之不可忽也至於來嵗則王又考之矣書曰考制度於四嶽此之謂也方是時也巡守至於十二嵗之久而未聞以疏為患者蓋逹法則同數器一度量諭禮禁而行人合方氏掌交之官嵗時往來既諭之矣至十一嵗則行人又考之及將巡狩則職方氏又戒之以其法偹其官衆故也逮夫法壞於後世而行人之屬亦廢而不修於是諸侯之政亂矣衛請繁纓數器亂矣兩國為之交質何有於瑞節諸侯皆去其籍何有於法則是數法者皆先王所以維持天下之具而乃廢弛如此宜乎憫亂於後世而欲行政於四方者猶以權量法度為心焉嗚呼使之得行其道則仲尼之烈是亦周公而已豈不惜哉以周知天下之故以天下望一人則受責為甚重以一人臨天下則用力為甚微夫以甚微之力而任至重之天下如必身親而後為之則列土至廣列侯至衆吾之足力有不給矣萬民利害庶政得失吾之目力有不周矣足不給目不周莫為之恤耶則得此而遺彼舉一而廢二為人上者幾何不負天下之望哉是故周之盛時設為小行人之職以巡邦國之諸侯治其事故而因以察邦國之政民之利害事之得失天時之變人治之常一皆載之書以告於王焉是以執要之君子不必足跡接乎諸侯之境者以有此官為之巡行故也不必目力察乎千里之外者以有此書為之稽考故也得其人以載其書則天下之事有不足知者矣故其職曰以周知天下之故夫故者有所因而使然者也天下之理物無常是亦無常非是非代更與時無止先王之治豈以有涯之力而窮無止之時萬民之事利而無害諸侯之政得而無失四時之行順而無忤而皆出於常然者先王於此亦無所用知矣王頒常法以授之諸侯侯奉常法以施之民可也奈何民無常利政無常得時無常順而乖戾之變有出於所遭之故者不有以知之則天下之不治有不基於此乎是以先王之於邦國也必因行人使於四方以致其察焉弔喪恤貧補灾贊善行人之為使也萬民利害庶治逆順凶荒悖亂康樂和親行人之為書也奉使者行人之職而書其政治者特因之而已故先之五物皆曰令者所以遣其出也後之五物皆曰反命於王者所以紀其歸也其出也於以同休戚王之仁也其歸也於此察政治王之智也行人一出而王之仁智兩得焉豈不曰法之善哉雖然行人所書特天下之故而已周知其利害者職方氏之書也周知其治者司㑹之書也職方者九州之圖一定之常典而已司㑹者四國之治三年之成功而已天下之事固有昔是今非而不出於一定日改月化而不待於三年者行人之書安可略耶噫先王既以其身當天下之任矣天下之利害吾身之休戚也有人於此疾疢之不知視聼之不聞而人以四體為不仁矣况以天下之利害而為人上者曽不聞知而加恤焉其得謂之仁乎孔子曰致五至行三無四方有敗必先知之此言其道也小行人曰凡此五物者每國辨異之以周知天下之故此言其法也道者先王所以治心法者有司所以紀事先王之時所以能使天下為一家中國為一人者豈特其道足以自致哉行人之書抑有助焉後世堂上之治逺於百里堂下之治逺於千里彼其一堂之間且不及知况欲知天下乎師氏以媺詔王任已者不足資人者有餘好大者不足積微者有餘天下之理也君子於此有貴於學者豈以人固有餘於已微固有餘於大哉已者人之類也資諸人斯足以成已矣大者微之積也積於微斯足以成大矣故雖以王者之尊道隆德偹而必資於師氏之官以媺詔之者豈不以資人而積微者有在是乎媺者充實之謂也充實而未至於光輝之大則雖媺也猶謂之微而已蓋善之初生其端甚微若火之始燃一撲之可滅也若泉之始達一障之可塞也有能充之則燎原之烈成淵之量自此以成人之為善何以異此自充實之美進而至於光輝之大則吾王為大矣自光輝之大進而至於化則吾王為聖矣自化之之聖進而至於不可知之神則吾王為神矣夫進王於神道雖非師氏之所能而詔王以媺為之開端者實師氏之功也孟子曰左右前後皆薛居州也王誰與為不善茍非其人則讒諂日進忠信日退一日暴之十日寒之有不保其萌者矣一齊人傅諸衆楚人咻之有不能正其言者矣尚何足以成盛德者乎是故先王之時既擇師氏之官以詔王矣又使之王舉則從者為是故也雖然師一也有曰太師者三公之職也有曰師氏者中大夫之職也而鄭氏乃以師氏即王之三公失之矣先王設官以道之至者為公德之中者為大夫公與王所論者道大夫所詔者媺其職之小大固不同矣故稱公以師則曰太稱大夫以師則曰氏者義可見也然而師氏卑矣不嫌於稱師者蓋善之所在無貴賤吾知師其道而已庸詎知其人之為貴賤耶觀先王名官之意而尊德重善有若此者則其詔王以媺蓋無有一言之不聼者矣為師氏者而有隱衷焉其先王之罪人乎時見曰㑹先王之正名賓禮豈茍然哉因時以制禮因禮以定名如斯而已矣蓋禮有出於四時之常者朝覲宗遇是也禮有出於一時之故者時見之禮是也禮之常者在天有時在國有經不待鎮圭之命而四方諸侯各以時至故名斯禮者亦各因其時義以道其勤而已至於無常之禮特出於一時之故而非素期焉者也當是時也非天子有以命之則諸侯莫知所赴然則名是禮者如之何亦曰惟我所以集而合之者以命焉可也大宗伯曰時見曰㑹其意如此何則朝覲宗遇四時之常禮也春者一嵗之始猶日之有朝焉夏者萬物相見猶人之有宗焉以春為朝則秋為夕而暮氣衰矣於此而見可謂勤矣故秋為覲以夏為相見則冬為相辨而各歸根矣於此而見是邂逅也故冬曰遇此四禮者皆有常期則正名其禮豈他求哉因時而已若夫王國有可議之政侯方有不寧之變於是將合諸侯而命事焉茍俟四時之朝而後圖之則失事之幾矣於是為壇於國門之外而集四方之諸侯以施政教以行禁令以命征伐以修詛盟是皆出於一時之事而非諸侯之常禮者也㑹非常禮唯上之命然後集而為一則命名之義不可以他求也其唯㑹之云乎書曰㑹其有極傳曰㑹之有尤㑹之為義言㑹諸侯而歸於一也此必有以㑹之然後彼來㑹焉亦猶嵗計之㑹凡以㑹衆要而為之總而已矣昔者孔子作春秋也內為志則曰及外為志則曰㑹時見者雖諸侯之禮實天子之志焉書㑹之義其亦本諸此乎雖然㑹者君之禮也一人之事也故嵗計之㑹惟王省之時見之㑹惟王用之考之於經蓋未有諸侯而言㑹者而春秋之時稱㑹者一何多耶故聖人列之於經不沒其實以著其罪觀晉侯召天王於河陽則聖人之譏深矣昔者惟王有㑹今則諸侯而㑹矣昔也惟王召臣今則以臣召君矣故欲觀周之盛衰非他求也於㑹見之矣方其中興也宣王㑹諸侯於東都及其寖衰也㑹不行於天子而行於諸侯又其極也㑹不行於諸侯而行於夷狄嗚呼周至於此不復振矣此聖人所以傷之也後之記禮者狃於所聞方且以諸侯相見於郊地亦謂之㑹是烏知先王之禮耶王大旅上帝何以謂之旅先王之制祭祀夫豈一端而已哉無事而祭者禮之常者也有故而祭者禮之變者也禮之常者五帝固有方矣百神固有職矣欲以祭之則即其常位可也若夫禮之變者特出於一時之故而非若無事之時為裕也舉尊而不及卑舉大而不及小則非所以祈福於百神於是即上帝之位而㑹百神以祭之夫㑹而祭之則衆矣此其祭所以謂之旅也蓋旅之為義猶卒旅之為旅也昔者先王寄軍師之法於鄉遂之中五家為比則合五人為之伍焉五比為閭則合五伍為之兩焉四閭為族則合四兩為之卒焉五族為黨則合五卒為之旅焉自卒而下其人寡矣自旅而上其人衆矣則旅也者可名為衆也自其無事而言之則五旅之人散而為民有至於一人之寡自其有事而言之而五卒之人聚而為旅有至於五百人之衆矣夫先王之制祭祀固有異用而同義者矣今夫一嵗之常祀無事而祭者也祭青帝於東郊祭赤帝於南郊祭白帝於西郊祭黑帝於北郊祭日於東祭月於西以至星辰風雨之神各於其位而祭之亦何異於五族之民無事則散而為一人之寡耶及其有故而旅於上帝也則神不可遍祭力不可遍及於是五精之帝日星之神風雨之師凡屬乎天者舉㑹於上帝而祭之亦何異於五卒之人有事則聚而為五百人之衆耶惟其百神之旅於上帝非其常位也則又與夫旅之為逆旅者合矣陳而成列也則又與夫旅之為陳旅者合矣然則先王之正名祀禮夫豈茍然而已哉且以下士之旅言之六官之長有至於三十有二人而謂之旅者以其衆也六官之屬雖至於十有六人不謂之旅者以其寡也幽而天神明而下士而取名於軍旅之意一皆以衆為義焉則夫旅之為衆抑又可考矣雖然天神之祭固多端矣致道以祭謂之祀祀昊天上帝是也偹物以祭謂之祭燔柴於泰壇祭天是也盡情以祭謂之享惟聖人為能享帝是也類其禮謂之類類於上帝是也造其所謂之造類造上帝是也營衛其神而祭謂之禜日月星辰之神霜雪風雨之不時於是禜之是也祀祭享無事而祭也三祭而異義類造禜有事而祭也三祭而異名禜之祭止於日月星辰而已類造之祭止於五帝而已惟類於上帝然後百神皆在焉謂之大旅者以其大於類造之祭故也記曰大饗之禮不足以大旅大旅具矣不足以享帝則有故而旅又未若専志以享於上帝之為大也嗚呼先王父事天神其道盡矣無事而享所以報也有故而祭所以祈也報之所以為仁祈之所以為義祈而旅焉則帝將百神而為之助又所以為智也舉祀典而三善從之則先王之祀上帝其義深矣則夫宗伯之典其禮典瑞之掌其器掌次之設其邸職金之供其版焉得不各致其職以為之輔耶善溝者水潄之順則通逆則塞物之常性也乃若水之為性其勢則趨於下而已矣順其下而導之則通而不窮逆其下而壅之則塞而不逹是以善治水者必先度地之勢而後致人之力以順導之故其勢若建瓴為沛然莫禦雖有阻遏之者亦將蕩然與之俱逝矣曽何壅塞之患耶匠人之職曰善溝者水潄之此之謂也蓋水之流行於天地之間猶人之有血氣也運而不積生以之遂節而不宣疾以之作故善衛生者必先運之使疾不生於身則夫善經野者其可不通之使害不生於地乎是故髙下者水之勢也我則因地之勢而導之使下廣深者人之功也我則致人之力而浚之使深遂地髙矣則因其下地而為溝焉溝地髙矣則因其下地而為洫焉洫地髙矣則因其下地而為澮焉自澮至川則為尤下矣此之謂因水之勢遂為淺矣溝則廣深以四尺焉溝四尺為淺矣洫則廣深以八尺焉洫八尺為淺矣澮則廣深以二尋二仭焉自澮至川則尤為深矣此之謂致人之功水之勢致其下矣人之功致其深矣則水之自遂而之溝自溝而之洫自洫而之澮自澮而之川是皆决髙以趨下去淺而就深者也故其流行之勢蕩然無滯雖有浮土不可壅也雖有腐薪不可遏也歷嵗已久而溝之為利猶日通而不窮孰謂不善溝者能之乎嘗觀禹之治水也始於兾中於雍卒於兖率皆因水勢而導之下故書曰九川滌源言其通而不壅也江河淮漢水之大者也治九川如此則浚畎澮距川亦若是而已矣是以商周承於其後雖其授田之法出於一時而溝洫之法一本於禹詩曰信彼南山維禹甸之此之謂也若夫稻人之為溝也特施於下地者爾然其職亦曰以溝蕩水蕩之為義潄而去之之謂也大之為江漢小之為下地為溝之法出乎一理則雖神如禹聖如周公旦不能逆水之性而治之况於後世者乎以任地事而令貢賦凡稅斂之事先王之政施報而已不施於先則野人莫治不報於後則君子莫養經田野施職事君子所以治野人也勤四體輸百物野人所以養君子也夫物之生於土地之間未有不資君子之法以盡野人之力以成者夫既相資而為用矣則吾頒地事以施於先而責其供地貢以報於後不亦可乎以任地事而令貢賦凡稅斂之事且有地斯有事有事斯有貢事者地之治也故治法不立不可以任土貢者事之功也故地事不舉不可以令貢昔者明王之疆理天下也知夫仁政之本必始於地法之立是故經土地辨井牧畫為井邑丘甸縣都之制則民有分土可致其力矣故繼之以任地事者所以為治野人之道也任農以耕任圃以植任牧以育任虞以山任衡以澤分為土牧園圃山澤之職則民有餘財於是乎可責以貢矣故又繼之以令貢賦所以為飬君子之道也地事者下之職故任之貢賦者上之政故令之夫使民任其事而上令其貢然能使樂從而不厭者是豈出於脅迫哉制之蓋有道矣土宜之法教之使知土均之法均之使平任土之法制之使稱地利之肥瘠人力之多寡適當其平則地事之任不患乎民之不勝矣大司徒制其征均人土均責其貢或裁地里以適於均或當邦賦以從其便則貢賦之令不患乎民之不從矣任之以事而勝此民財所以裕也令之以貢而從此國用所以充也裕民充國非仁政何以哉雖然既謂之貢賦又曰凡稅斂之事何也蓋上以政取謂之賦斂財賄是也下以職供謂之貢若任農以耕事貢九榖是也稅其物謂之稅若槩而不稅是也掠取其物謂之斂若春斂皮冬斂革是也析而言之其義固異合而言之其用則同以閭師考之農貢九穀圃貢草木皆謂之貢矣而其先曰以時征其賦則知貢與賦之用同也以司書考之掌邦之九賦九政九事此貢賦之謂也而其終曰凡稅斂者受法焉則知貢賦與稅斂之用同也大抵理財之義不一而足有曰貢曰賦者所以辨所取所供之義曰稅曰斂者所以辨所稅所取之義也貢賦之征大故司徒司書皆以貢賦為之主稅斂之物微故司徒司書以貢賦有所未盡者特言凡稅斂以該之而已周官之時貢賦稅斂雖有異名而所取曽不過乎什一者要其實而言之故也逮其後世諸侯侵叛莫之知止以區區之魯而稅畝丘甲田賦之法相繼而起其慢經界於斯甚矣故聖人勤勤筆之於經者其亦欲以正名而救當時之失云耳劉左史集卷二

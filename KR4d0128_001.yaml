body:
  text: 劉左史集卷一宋劉安節撰奏議論謹擇皇子官屬臣聞天下之本有三法度皇子人材是也而法度人材又以皇子為之本皇帝陛下詳延俊良列於庶位恢張綱目細大畢舉實社稷無疆之業乃者皇子就傅選置官屬為之輔導獨出宸鑒之所識擢可謂急所本矣臣聞賈誼言曰天下之本繫之太子太子之善在於早諭教與選左右夫翊善侍講記室之職實掌教諭前日慎柬既已精矣而左右者亦不可不慎蓋諭教之官趨見有時左右之臣朝夕於側所以服習積慣者為賴已多必得其人乃克有補方今近侍之臣其賢與否固已不逃陛下之熟察矣臣願慎擇莊恪純厚而博學者以充左右之選左右罔非正人則所聞皆正言所見皆正行元良正而天下定矣茍羣枉雜進則治忽以分可不畏哉可不慎哉論尚同之弊臣伏覩獻嵗紀元之號曰政和蓋自神考稽古立政實創厥始繼繼承承至於今日斟酌損益克底於中此政和之實也然臣聞之和與同異可否相濟曰和可可否否曰同曩者朝廷立法之初意甚美也而議論之臣曽不為國家深惜惟務希合以濟其私往往順承太過浸失本意此尚同之弊也幸陛下神聖獨斷親灑宸翰以敕有司參酌前後之宜悉從中制一代之興遂成完文庶政惟和適在今日夫同者憂其説之不合一已之私也和者惟義所在天下之公也願陛下明敕羣吏各公乃心務輸忠實毋或徇私以為雷同有所建立不憚可否參於至當以合乎孔子所謂不同之義則政和之效出前古矣詩曰不競不絿不剛不柔敷政優優百祿是遒此言湯政之和而獲天福也惟陛下留神天下幸甚表大觀改元賀正旦開嵗發春帝方出震體元御極王乃憲天肆羣后之在朝開明堂而坐治隆名從古縟典偹今中賀恭惟皇帝陛下睿智有臨謙沖不伐維紹休於烈考以欽命於昊穹正月始和茂對乾元之首大觀在上一新渙號之孚爰舉盛儀用昭鴻烈奔旅庭之萬國儼執玉之千官坐烜威容密符祥祐臣適將使命出按學官去國逾時望不違於一咫奉觴無地頌徒極於萬年賀天寧節電繞斗樞上昭乾緯虹流華渚俯賁坤維凡居二氣之中咸仰千齡之會歡然萬口端若一辭中賀恭惟皇帝陛下嗣守丕圖誕膺明命無疆之厯如日初升有羡之年與天同久五百餘嵗適丁一遇之期億萬斯年翕受四方之賀臣幸逢休旦叨被誤恩乘使者車雖無禆於晉部祝聖人夀竊有慕於華封賀收復洮河積石廟謀獨運坐懾羌戎沙幕一空願為臣妾捷奏交播歡聲四馳中賀竊以髙宗之伐鬼方商師必克宣王之征玁狁周道復興然動兵久至於三年而闢國僅聞於百里功著二代言埀六經矧我肇復臨洮逺連積石極司空伯禹導河之所自抵博望張騫尋源之所窮坐收斥地逺境之功迄無亡矢遺鏃之費戎軒所至簞食相迎不逾浹旬之間奄有千里之逺敻然上古邈爾擬倫恭惟皇帝陛下睿智有臨神武不殺排浮議紛紜之衆運沈機眇忽之先願言有苖之征無逺弗屆追頌淮西之烈惟斷乃成臣荷國誤恩逢時休運靖玉關之柝預聞郵置之傳上金殿之觴獨逺簮紳之列賀九鼎成鑄九牧之金成一代之寶聖謀有作國勢益隆中賀竊惟神器之廢興顧與天時為消長周遷洛邑爰開卜世之祥漢得汾隂亦重紀年之號或襲於前而非作或得其一而靡全尚能對天閎休作國重鎮著在信史播為美談矧去千古億載之間而成九鼎萬鈞之重煥矣龍文之爭耀炳然金鉉之相鮮貯之神宫名曰大寶蓋歷世所不克為者非聖人孰能為歟恭惟皇帝陛下以寬沖接下之德大飬羣賢以聰明周物之智取新百度蓋欲銘功於不朽又將保祚於無窮質鬼神而無疑配天地而不恥孝思斯格固無飛雉之來升神物所存想有黃雲之在上臣獲聞縟禮屬使一方瞻望漢庭雖莫預吾丘之對稽參夏鼎猶能預大禹之功饒州謝到任樗櫟散材一無可用乾坤大度何所不容顧雖煩言排擊之餘猶玷千里師帥之寄戴恩深厚撫已兢慚中謝伏念臣蕞爾迂踈偶然遭際龍墀賜對初無可採之言烏府偹貟誤膺不次之選脫身冗散厠迹清華所宜激昻少報知遇而乃攝承言路未及建明定省親庭遽焉辭去以至記言左史蕝禮奉常朝廷進退之恩莫非曲折臣子辭受之義獨昧幾先是皆臣罪之當誅敢咎人言之可畏投間置散誰曰非宜宣化承流始望不及過蒙優假祗荷恩私此蓋伏遇皇帝陛下用舜之中則堯之大謂臣親蒙睿擢宜有朴忠憐臣久侍清光特留矜念少逭邦刑之峻稍從郡職之勞有社有民敢憚江湖之逺惟忠惟孝有如天日之臨恩可報於萬分身顧輕於九死謝賜厯日舜璣仰察前知七政之齊堯歷下頒特謹四時之序正朔所建華夷率同中謝恭惟皇帝陛下之德之純惟天不已一動一靜與時偕行乃厯象乎日月星辰以布治乎邦國都鄙謂乘軺之雖逺與承詔之在兹倬彼雲章來從帝所臣敢不疚心多士勉力百為期推擴於上恩庶少禆於洪造期集謝賜錢命拜玉墀載瞻晬表慶流泉府更沐深恩祇奉寵靈伏增震悸中謝伏念臣等服疇賤士占畢腐儒幸逢清世之右文常欲赤心而許國雖沉沉九重之邃無籍可尋而區區一介之微每懷靡及比緣計進獲以名聞入造嚴宸天威咫尺退承休渥命服光華顧惟踈逖之身荷此便蕃之寵未能一日少輸犬馬之勤更畀千金愈重丘山之戴諸生咸集多士有光此蓋伏遇皇帝陛下淵默深宫龍飛寶位博羣才而兼取厚百福以先施柱石以成不費枅櫨之用駑驅將駕復推芻秣之恩臣敢不云云永念戴君之賜何日而忘誓殫報國之忠自今以始疏狀天寧節功德疏千載應期適聖神之嘉會萬年稱祝實臣子之至恭輒攄微誠仰干慈祐皇帝陛下伏願珍符錫羡寶祚延洪嗣厯無疆新又新而不息降年有永朔復朔而惟休大敷皇極於黎元以享太平之盛福天寧節進銀狀右前件物充晉國之土貢出魯泮之幣餘伏以虹電流輝於赫聖神之運梯航納賮交修臣子之恭矧遘昌辰叨膺明命董儒宫之多士將使節於一方雖山呼者三莫預上觴而稱夀然庭實旅百且有內金之示和輒馳虞廪之餘少效楚芹之獻誠非物稱愧與懼并又右前件物虞廪之餘禹貢所載竊以握符御極適啓運於聖神奉幣獻琛爰輸誠於臣子莫不旁連海嶠駢集梯航矧惟一介之臣親遘千齡之會蒙恩已厚論報維何上萬年之觴獨逺鵷鴻之列致五官之貢敢忘螻蟻之誠顧莫稱於情文第彌深於祝頌又右前件物邦國之常臣職所謹伏以五百餘嵗適丁一遇之期億萬斯年翕受四方之賀梯山棧谷輦賮航琛莫非王土之毛曽何臣力之有顧以一介遭遇國恩嘉與諸生講明學政上觴稱夀悵莫綴於朝班內金示和願逺充於庭實情非物稱愧與畏并明堂進銀狀右前件物繄晉國之土毛充侯服之祀貢竊以惟聖為能饗帝允屬熙朝而至孝莫大配天肇修縟禮濟濟奔走之在廟峨峨左右之奉璋莫非王臣各揚爾職而臣猥以一介遭遇國恩嘉與諸生講明學政使臣有命莫陪執豆之恭王祭不共宜獲包茅之譴輒輸不腆之賦以敘無能之詞顧弗稱於情文第彌深於兢懼啓代賀林樞密伏審榮被宸恩擢參機政十行錫命奉紫禁之新書再拜揚休識青氊之舊物華夷交慶朝野共瞻恭惟某人學造古初知周事表言行不渝於素履謀謨多見於膚功賔賢興能六卿之遺典制禮作樂三代之宏規凡曰制度云為之經必資討論修飾之力以至入持從橐出擁使軺尹衆大之區曽蔑一人之獄典銓衡之選各當羣吏之能非遇盤根安知利器如遊餘刃不見全牛可謂周才蔚有成績久著聞於輿頌實簡在於上心進登樞機入奉帷幄朝廷之勢已增重於萬鈞樽爼之間自折衝於千里某夙蒙庥芘今荷陶鎔材館非遙限官針之有守龍門在望悵班賀之無從臨風徒劇於再三濡筆詎殫於萬一代賀朱右丞伏審拜中天之綸綍提右轄之紀綱朝野具瞻華夷交慶恭惟某人養剛大之氣挺瑰瑋之才射策龍墀光生韋布抗章烏府聲動簮紳金百錬而更剛松四時而不改禮樂載講爰稽逺猷學校中興悉資碩畫力共持於國是心自結於主知果副簡求益隆眷委朝廷既正安若太山而四維社稷無疆壯哉明堂之一柱某蒙恩滋久去德猶新緬想教言隱然在耳適縻官守邈爾承顔望風常極於再三濡筆詎殫於萬一代賀梁右丞伏審拜命中宸提綱右轄增重本朝之勢益隆寰海之瞻恭惟某人識量淵深才猷頴拔丹誠許國蚤自結於主知洪業在民顧久傾於輿望頃自地官之重仍專天府之繁皆時所難不日而理倉箱有所亟登九嵗之儲狴犴之間曽蔑一人之獄方頌臯陶之底績果聞虞帝之念功進總憲綱參持政本大賢在位勢已固於金城和氣致祥時遂調於玉燭某蒙恩滋久聞命維何大厦以成喜罙深為燕雀慶雲所芘惠豈間於荆榛願以頑冥之資終歸陶冶之賜永言欣幸倍百等夷代賀徐右丞伏審拜命中宸提綱右轄增重本朝之勢益隆寰海之瞻恭惟某人博學究乎古今徑氣貫乎金石方冕旒之垂聽職臺諌以盡規遭時中更秉志不昜雞風雨以雖晦松冬夏而自青抗章辨明引義慷慨蔑然強禦之畏休有忠讜之風在廷諸儒無出右者雖古烈士何以加諸用能定國是於紛紜之中結主知於啓沃之際夕郎批敕力可回天版部理財政聞富國雖皆不次之舉未究非常之才及此綸言擢之柄任朝廷既正安若太山而四維社稷以寧壯哉明堂之一柱某蒙恩滋久聞命維何幸膺爐錘之餘矧是門闌之舊撫躬何有欣自附於青雲企踵為勞嘆未披於宿霧永言慶懌倍百等倫代賀薛內翰伏審親屈使軺肅將王命越從壁水之峻進直金鑾之崇儒道有光士林相慶恭惟某人儒宫柱石學海舟航方雍泮之肇新躐簮紳而登用入陪經幄出正師模三物教民庶比隆於周室四科取士未專美於孔門幾及成功俄更前意雞風雨以雖晦松冬夏而自青言必據經事皆師古力掃久隂之宿霧還我青天遂廽既倒之狂瀾復吾故道天風申命雲漢成章顧學政更新無非極一時之選惟儒宗難繼是以終三年之淹士論未平上心方契花甎晨入日影未移蓮燭夜歸漏聲頻轉豈止掩芳於三俊直將比美於六經某梓里諸生芹宫一介戲陳爼豆嘗為同隊之魚景迫桑榆獨作空羣之馬仰飛黃之騰踏笑斥鷃之翺翔管席甚疏尚幸故人之不棄膺門在望未知何日之可登倘容附驥之蠅一振處雞之鶴誓將碎首報以終身代賀朱都運伏審光奉皇恩榮司漕計近在西郊之外蔚為諸路之先宸眷甚優師言惟允恭惟某人美由世濟忠以孝移艱難偹厯於百為險昜嘗持於一節驅馳奉事久矣賢勞懇惻抗章遽以疾請方聖主進為之日豈賢人退處之時果爾綸言起之琳館矧夫方千里之內畫為王畿尚以三十年之通制此國用外建四輔旁資萬營迄無不足之憂休有已試之效雖曰奉身而退豈舍王哉維是度才以居無昜公者都門一出邸吏相迎滿目山川依然前日之舊夾道父老恍若故鄉之歸習俗便安吏民惟悅某傾依芘覆每荷吹噓屬守官針致妨賓謁惟佇聆於召節當亟展於慶函尚托餘輝少安綿力載惟欣幸曷究敷宣代賀盧營田伏審光奉宸綸寵更使繡瞻行軒之在邇與屬部以交欣恭惟某人德器靚深久騰士論才猷明敏蚤結主知方皇家廟算之才復周室鄉兵之漸出持使節往按邉封自陜以西已餘驍勇惟晉之舊更藉規為大修充國之屯田廣募魏氏之武卒兹惟上策允屬全才方圖慶幅之修先辱占書之貺永言感刻曷究敘陳代賀孫營田伏審被命中宸按兵劇部周才獲試公義攸歸恭惟某人茂著風猷雅宏器業詞章藻麗久播儒林政術設施方隆宸眷爰自對揚之美寵將出使之權矧晉舊墟曰古強國蓋好武出於天性自昔而然而教兵藏之民間於斯為盛且耕且戰足食足兵何待三年可使有勇坐令四國罔不畏威即拜優恩以彰成績顧惟不敏實仰髙風欽頌之誠敘言曷究代王漕賀馮提舉伏審光膺詔綍榮擁使軺蔚為多士之依歸允副一時之遴選國家遭時定制稽古建官賓興賢能周鄉師之分職循行郡國漢博士之觀風無非慎簡於宗儒於以肅將於使指恭惟某人士林擢秀學海資深絳帳橫經已變貴逰之習繡衣持節更恢化育之功矧夫大河以東全晉之地文學宗子夏之富經術推仲淹之窮今古相望顧流風之未泯庠序之教方盛世之所先佇觀輶軒之行一闡泮宫之化異人間出髦士攸宜顧實譾材叨同大部偶攝官而承乏徒盡瘁以在公况綜衆務之非専焉有舊政之可告仰髙滋久瞻德未遑傾頌之私敷宣罔究代吳提學見執政吳以越職言事罷學事剡章失當自抵刑書議罰從寬止還銓部罪深責淺恩重命輕伏念某樗櫟散材久知無用斗筲小器終愧昜盈頃新三舍之文誤膺一介之使雖更異志不負初心蓽路籃輿寧有辭於跋履雲章奎畫每相戒以遵承而識慮不通矜持太過謂𣙜酤之職有添助之酒錢攝邑於時實管鈎於學事既違明詔輒擾細民知而弗言罪恐不免殊不思法嚴分守事有司存過計私憂乃至為蛇而畫足侵官離局幾同越爼以代庖况有常刑著之甲令荐頒睿旨申警官聨言在耳以未忘罪擢髮而莫數伏蒙某人深通下志明燭事微察其所言蓋止沿於循習憐其所犯在奉法於丁寧姑爾薄懲以為大戒退慙昏昧上玷使令於學校興盛而罹失伍之誅方朝廷清明而預黜幽之罰杜門引咎有愧友朋引鑑照形可憎面目某惟當追循往眚祗服厚恩未迫桑榆儻前愆之可贖誓鞭駑馬庶後效之是圖代吳提舉再領學司謝監司伏奉詔條申嚴學政承誤恩之下逮傃舊部以來歸倒指半年僅如前日舉頭全晉恍若故鄉顧疲懦之無堪識吹噓之有自兹蓋伏遇某人衷誠許國內恕及人樂與一方之秀民馴臻三代之美俗留情泮水蓋常言必稱之加意子襟謂是政所先者按行所至奬借實多肆令澄汰之餘復董賔興之盛眷河之左俗號少文建學以來士稍知化必將逺期之嵗月始能仰副於朝廷豈兹微才可覬成效所幸同舟而濟適獲所依願分鄰室之光以資不逮望風良切瞻德未皇傾頌之私敷宣罔既謝免省比年課藝幸據上遊今日程文復叨優等爰充名於桂籍行待問於楓廷得非所宜愧不能稱竊以先王育材於學本以取人君子修善於身固將從政惟所用出於所教故能言必也能行詩書所稱豈有異致公卿之選悉由此途凡其一時出長入治之庶官莫非六卿時書嵗考之多士待以積久取之盡公斯民所以直道而行在昔稱為至治之極降及後世溺於末流以六藝為繁文謂上庠非急務太常受業徒評平日之空言列郡應書盡出臨時之私意上之所求幾於無用下之所學亦非可行不知撡縵之為安烏有畫餅之可食曠矣千載循乎一途此衰世之軌所以相尋而聖人之道未知能復恭惟國家承百年之積弊恢七世之大猷泛觀古今洞見根本謂兩漢而下所以失由觀人以一日之長而三代之治所由興蓋入學有中年之考乃闢黌舍以來俊英增弟子之千員頒新書之萬卷春誦夏絃而經以師授月書季考而士由舍升既考之於尋常復試之於倉卒且環橋者億萬不已多乎及揚觶之再三僅有存者故自元豐之肇造迄乎紹聖之纘承雖有求者纍年於兹而所得者數人而已宜獲異材之間出以彰新法之大成如某智不適時學方為已徒以雙親孝飬未忘干祿之心三舍序升式重興賢之禮俯首百試旅身七年幾成上考之功猶屬中變之法頃造公選再程斐文言實工於前時名亦玷於異等知其非幸許以從新方虞再鼓而衰甘為殿後不謂適矢復沓優入彀中退慙毁瓦之無功進喜望雲之有日迹其所自敢不知歸兹蓋伏遇某人云云頃膺明命兩董學官幸升夫子之堂獲就諸生之列參乎未達方求一道之歸偃也何如或許片言之是待以殊等出於衆人雖華塗浸進於台司而雅意不忘於璧水龍門益峻猶許再登駑馬方疲幸叨一顧繫餘光之下庇使朽質以生榮故於選掄誤被收録力探聖賢之閫域誓窮師友之淵源謝王漕舉改官孺文論舊方有賴於二天北海薦賢謬見推於一鶚顧藝能之無取辱聲聞之過情豈其所宜祗足為愧竊以保舉之法古稱至公請託之私今為後患以言故不若親之近以論才不若勢之嚴捨此二端未知一可倘非大賢之特達自拔流俗之卑汚肯為清朝舉一寒士如某者服疇冷族占畢腐儒頃緣三舍之諸生擢預外臺之屬吏芙蓉泛水幸厠英流松柏成林獨慙弱植坐見飛黃之騰踏分甘斥鷃之翺翔自知非才每以無怨矧泮宫之長育具宸筆之丁寧官各攸司顧簡書之可畏言非有補用掾屬以何為提空師以焉歸傃舊巢而是託左車餘虜曷足與謀管仲困時固多不利所宜剡章而薄責乃復借譽以片言豈有淺能可希寸進此蓋伏遇某人秉心近厚立行有常范叔甚貧嘗有一日之雅而晏嬰雖久不忘平生之言曲憐留滯之餘加畀吹噓之末其為賜也不已多乎某敢不祇服官針益修士檢至所未至聞所未聞非曰能之倘遂古人之志可無愧矣不虛國士之知謝司業改官膺門餘地雖幸登龍融帳多賢敢希薦鶚省躬有愧荷德無窮竊惟中古以來未有今日之盛即郊置學環水為池淵然道德之流邃矣詩書之府維時宗匠作我主盟凡厥抱材咸希推轂矧庀司於魯泮悉𨽻籍於虞庠顧乏偉人以光清舉如某者門闌棄物湖海散材偶緣三舍之諸生擢預外臺之屬吏追隨使命幾疲汾晉之山川寤寐師承徒夢辟雍之鐘鼓每惟踈逖久此棄捐命職自天人孰為地不謂大賢之特達曲憐小邑之遐遺借以片言俾之寸進兹蓋伏遇某人善惟引類美務成人謂其少學藝文誤中程於上客雅知規矩嘗侍席於先生曲矜留滯之餘加畀吹噓之末其為賜也不已多乎某敢不益進初心力修舊學逺探聖賢之旨趣上承師友之淵源非曰能之倘遂古人之志可無愧矣不虛君子之知謝葉博士烏府偹員方慙非據螭坳庀職敢幸見收諒難愜於師言已追還於成命過蒙矜恤預賜褒揚義不敢當愧無以處儻慿餘庇之及獲安舊職之常荷德實多敘言奚究嵗云暮矣物不終窮賢者履之福將自至佇膺異數式慰鄙懷劉左史集卷一

body:
  text: 劉左史集巻一宋劉安節撰奏議論謹擇皇子官属臣聞天下之本有三法度皇子人材是也而法度人材又以皇子為之本皇帝陛下詳延俊良列於庶位恢張綱目細大畢舉寔社稷無疆之業乃者皇子就傅選置官属為之輔導獨出宸鍳之所識擢可謂急所本矣臣聞賈誼言曰天下之本繋之太子太子之善在於早諭教與選左右夫翊善侍講記室之職寔掌教諭前日慎柬既已精矣而左右者亦不可不慎盖諭教之官趨見有時左右之臣朝夕於側所以服習積慣者為賴已多必得其人乃克有補方今近侍之臣其賢與否固已不逃陛下之熟察矣臣願慎擇莊恪純厚而博學者以充左右之選左右罔非正人則所聞皆正言所見皆正行元良正而天下定矣茍羣枉雜進則治忽以分可不畏哉可不慎哉論尚同之弊臣伏覩獻嵗紀元之號曰政和盖自神考稽古立政實創厥始繼繼承承至於今日斟酌損益克底於中此政和之實也然臣聞之和與同異可否相濟曰和可可否否曰同曩者朝廷立法之初意甚美也而議論之臣曽不為國家深惜惟務希合以濟其私徃徃順承太過浸失本意此尚同之弊也幸陛下神聖獨斷親洒宸翰以勅有司参酌前後之宜悉從中制一代之興遂成完文庶政惟和適在今日夫同者憂其説之不合一已之私也和者惟義所在天下之公也願陛下明勅羣吏各公乃心務輸忠實毋或狥私以為雷同有所建立不惮可否参於至當以合乎孔子所謂不同之義則政和之效出前古矣詩曰不競不絿不剛不柔敷政優優百祿是遒此言湯政之和而獲天福也惟陛下留神天下幸甚表大觀改元賀正旦開嵗發春帝方出震體元御極王乃憲天肆羣后之在朝開明堂而坐治隆名從古縟典偹今中賀恭惟皇帝陛下睿智有臨謙冲不伐維紹休於烈考以欽命於昊穹正月始和茂對乾元之首大觀在上一新渙號之孚爰舉盛儀用昭鴻烈奔旅庭之萬國儼執玉之千官坐烜威容宻符祥祐臣適将使命出按學官去國逾時望不違於一咫奉觴無地頌徒極於萬年賀天寕節電繞斗樞上昭乾緯虹流華渚俯賁坤維凡居二氣之中咸仰千齡之㑹歡然萬口端若一辭中賀恭惟皇帝陛下嗣守丕圖誕膺明命無疆之厯如日初升有羡之年與天同乆五百餘嵗適丁一遇之期億萬斯年翕受四方之賀臣幸逢休旦叨被誤恩乘使者車雖無禆於晉部祝聖人夀竊有慕於華封賀收復洮河積石廟謀獨運坐懾羌戎沙幕一空願為臣妾捷奏交播驩聲四馳中賀竊以髙宗之伐鬼方商師必克宣王之征玁狁周道復興然動兵乆至於三年而闢國僅聞於百里功著二代言埀六經矧我肇復臨洮逺連積石極司空伯禹導河之所自抵博望張騫㝷源之所窮坐收斥地逺境之功迄無亡矢遺鏃之費戎軒所至簞食相迎不逾浃旬之間奄有千里之逺夐然上古邈爾擬倫恭惟皇帝陛下睿智有臨神武不殺排浮議紛紜之衆運沈機眇忽之先願言有苖之征無逺弗届追頌淮西之烈惟斷乃成臣荷國誤恩逢時休運靖玉關之柝預聞郵置之傳上金殿之觴獨逺簮紳之列賀九鼎成鑄九牧之金成一代之寳聖謀有作國勢益隆中賀竊惟神器之廢興顧與天時為消長周遷洛邑爰開卜世之祥漢得汾隂亦重紀年之號或襲於前而非作或得其一而靡全尚能對天閎休作國重鎮著在信史播為美談矧去千古億載之間而成九鼎萬鈞之重煥矣龍文之争耀炳然金鉉之相鮮貯之神宫名曰大寳盖歴世所不克為者非聖人孰能為歟恭惟皇帝陛下以寛冲接下之德大飬羣賢以聰明周物之智取新百度盖欲銘功於不朽又將保祚於無窮質鬼神而無疑配天地而不恥孝思斯格固無飛雉之来升神物所存想有黄雲之在上臣獲聞縟禮属使一方瞻望漢庭雖莫預吾丘之對稽参夏鼎猶能預大禹之功饒州謝到任樗櫟散材一無可用乾坤大度何所不容顧雖煩言排擊之餘猶玷千里師帥之寄戴㤙深厚撫已兢慚中謝伏念臣蕞爾迂踈偶然遭際龍墀賜對初無可採之言烏府偹貟誤膺不次之選脱身冗散厠跡清華所宜激昻少報知遇而乃攝承言路未及建明定省親庭遽焉辭去以至記言左史蕝禮奉常朝廷進退之恩莫非曲折臣子辭受之義獨昧㡬先是皆臣罪之當誅敢咎人言之可畏投閒置散誰曰非宜宣化承流始望不及過䝉優假祗荷恩私此盖伏遇皇帝陛下用舜之中則堯之大謂臣親䝉睿擢宜有樸忠憐臣乆侍清光特留矜念少逭邦刑之峻稍從郡職之勞有社有民敢惮江湖之逺惟忠惟孝有如天日之臨恩可報於萬分身顧輕於九死謝賜厯日舜璣仰察前知七政之齊堯歴下頒特謹四時之序正朔所建華夷率同中謝恭惟皇帝陛下之徳之純惟天不已一動一静與時偕行乃厯象乎日月星辰以布治乎邦國都鄙謂乘軺之雖逺與承詔之在兹倬彼雲章来從帝所臣敢不疚心多士勉力百為期推擴於上恩庶少禆於洪造期集謝賜錢命拜玉墀載瞻晬表慶流泉府更沐深恩祇奉寵靈伏増震悸中謝伏念臣等服疇賤士佔畢腐儒幸逢清世之右文常欲赤心而許國雖沉沉九重之䆳無籍可㝷而區區一介之㣲每懐靡及比緣計進獲以名聞入造嚴宸天威咫尺退承休渥命服光華顧惟踈逖之身荷此便蕃之寵未能一日少輸犬馬之勤更畀千金愈重丘山之戴諸生咸集多士有光此盖伏遇皇帝陛下淵黙深宫龍飛寳位博羣才而兼取厚百福以先施柱石以成不費枅櫨之用駑驅将駕復推芻秣之恩臣敢不云云永念戴君之賜何日而忘誓殚報國之忠自今以始疏狀天寕節功徳䟽千載應期適聖神之嘉㑹萬年稱祝實臣子之至恭輙攄㣲誠仰干慈祐皇帝陛下伏願珎符錫羡寳祚延洪嗣厯無疆新又新而不息降年有永朔復􅃋而惟休大敷皇極於黎元以享太平之盛福天寕節進銀狀右前件物充晋􅀦之土貢出魯泮之幣餘伏以虹電流輝於赫聖神之運梯航納賮交修臣子之恭矧遘昌辰叨膺明命董儒宫之多士将使節於一方雖山呼者三莫預上觴而稱夀然庭實旅百且有内金之示和輙馳虞廪之餘少效楚芹之獻誠非物稱愧與懼并又右前件物虞廪之餘禹貢所載竊以握符御極適啟運於聖神奉幣獻琛爰輸誠於臣子莫不旁連海嶠駢集梯航矧惟一介之臣親遘千齡之㑹䝉恩已厚論報維何上萬年之觴獨逺鵷鴻之列致五官之貢敢忘螻蟻之誠顧莫稱於情文第彌深於祝頌又右前件物邦國之常臣職所謹伏以五百餘嵗適丁一遇之期億萬斯年翕受四方之賀梯山棧谷輦賮航琛莫非王土之毛曽何臣力之有顧以一介遭遇國恩嘉與諸生講明學政上觴稱夀悵莫綴於朝班内金示和願逺充於庭實情非物稱愧與畏并明堂進銀狀右前件物繄晋國之土毛充侯服之祀貢竊以惟聖為能饗帝允属熈朝而至孝莫大配天肇修縟禮濟濟奔走之在廟峨峨左右之奉璋莫非王臣各揚爾職而臣猥以一介遭遇國恩嘉與諸生講明學政使臣有命莫陪執豆之恭王祭不共宜獲包茅之譴輙輸不腆之賦以叙無能之詞顧弗稱於情文第彌深於兢懼啟代賀林樞宻伏審榮被宸恩擢叅機政十行錫命奉紫禁之新書再拜揚休識青氊之舊物華夷交慶朝野共瞻恭惟某人學造古初知周事表言行不渝於素履謀謨多見於膚功賔賢興能六卿之遺典制禮作樂三代之宏規凡曰制度云為之經必資討論修飾之力以至入持從橐出擁使軺尹衆大之區曽蔑一人之獄典銓衡之選各當羣吏之能非遇盤根安知利器如㳺餘刃不見全牛可謂周才蔚有成績乆著聞於輿頌實簡在於上心進登樞機入奉帷幄朝廷之勢已増重於萬鈞樽爼之間自折衝於千里某夙䝉庥芘今荷陶鎔材館非遥限官箴之有守龍門在望悵班賀之無從臨風徒劇於再三濡筆詎殚於萬一代賀朱右丞伏審拜中天之綸綍提右轄之紀綱朝野具瞻華夷交慶㳟惟某人養剛大之氣挺瑰瑋之才射策龍墀光生韋布抗章烏府聲動簮紳金百錬而更剛松四時而不改禮樂載講爰稽逺猷學校中興悉資碩畫力共持於國是心自結於主知果副簡求益隆睠委朝廷既正安若太山而四維社稷無疆壯哉明堂之一柱某䝉恩滋乆去徳猶新緬想教言隐然在耳適縻官守邈爾承顔望風常極於再三濡筆詎殚於萬一代賀梁右丞伏審拜命中宸提綱右轄増重本朝之勢益隆寰海之瞻恭惟某人識量淵深才猷頴㧞丹誠許國蚤自結於主知洪業在民顧乆傾於輿望頃自地官之重仍專天府之繁皆時所難不日而理倉箱有所亟登九嵗之儲狴犴之間曽蔑一人之獄方頌臯陶之底績果聞虞帝之念功進縂憲綱参持政本大賢在位勢已固於金城和氣致祥時遂調於玉燭某䝉恩滋乆聞命維何大厦以成喜罙深為燕雀慶雲所芘惠豈間於荆榛願以頑㝠之資終歸陶冶之賜永言欣幸倍百等夷代賀徐右丞伏審拜命中宸提綱右轄増重本朝之勢益隆寰海之瞻恭惟某人博學䆒乎古今勁氣貫乎金石方冕旒之垂聽職臺諌以盡規遭時中更秉志不昜雞風雨以雖晦松冬夏而自青抗章辯明引義慷慨蔑然強禦之畏休有忠讜之風在廷諸儒無出右者雖古烈士何以加諸用能定國是於紛紜之中結主知於啟沃之際夕郎批勅力可囬天版部理財政聞富國雖皆不次之舉未䆒非常之才及此綸言擢之柄任朝廷既正安若太山而四維社稷以寕壮哉明堂之一柱某䝉恩滋乆聞命維何幸膺鑪錘之餘矧是門䦨之舊撫躬何有欣自附於青雲企踵為勞嘆未披於宿霧永言慶懌倍百等倫代賀薛内翰伏審親屈使軺肅将王命越從壁水之峻進直金鑾之崇儒道有光士林相慶恭惟某人儒宫柱石學海舟航方雍泮之肇新躐簮紳而登用入陪經幄出正師模三物教民庶比隆於周室四科取士未專美於孔門㡬及成功俄更前意雞風雨以雖晦松冬夏而自青言必㨿經事皆師古力掃乆隂之宿霧還我青天遂廽既倒之狂瀾復吾故道天風申命雲漢成章顧學政更新無非極一時之選惟儒宗難繼是以終三年之淹士論未平上心方契花甎晨入日影未移蓮燭夜歸漏聲頻轉豈止掩芳於三俊直将比美於六經某梓里諸生芹宫一介戯陳爼豆嘗為同隊之魚景廹桑榆獨作空羣之馬仰飛黄之騰踏笑斥鷃之翺翔管席甚䟽尚幸故人之不棄膺門在望未知何日之可登倘容附驥之蠅一振處雞之鶴誓将碎首報以終身代賀朱都運伏審光奉皇恩榮司漕計近在西郊之外蔚為諸路之先宸睠甚優師言惟允恭惟某人美由世濟忠以孝移艱難偹厯於百為險昜嘗持於一節驅馳奉事乆矣賢勞懇惻抗章遽以疾請方聖主進為之日豈賢人退處之時果爾綸言起之琳舘矧夫方千里之内畫為王畿尚以三十年之通制此國用外建四輔旁資萬營迄無不足之憂休有已試之效雖曰奉身而退豈舎王哉維是度才以居無昜公者都門一出邸吏相迎滿目山川依然前日之舊夹道父老恍若故鄉之歸習俗便安吏民惟悦某傾依芘覆每荷吹嘘属守官箴致妨賓謁惟佇聆於召節當亟展於慶函尚托餘輝少安綿力載惟忻幸曷究敷宣代賀盧营田伏審光奉宸綸寵更使繡瞻行軒之在邇與属部以交欣恭惟某人德器靚深乆騰士論才猷明敏蚤結主知方皇家廟算之才復周室鄉兵之漸出持使節徃按邉封自陜以西已餘驍勇惟晋之舊更藉規為大修充國之屯田廣募魏氏之武卒兹惟上策允属全才方圖慶幅之修先辱占書之貺永言感刻曷究叙陳代賀孫營田伏審被命中宸按兵劇部周才獲試公義攸歸恭惟某人茂著風猷雅宏器業詞章􅇨麗乆播儒林政術設施方隆宸睠爰自對敭之美寵将出使之權矧晋舊墟曰古強國盖好武出於天性自昔而然而教兵藏之民間於斯為盛且耕且戰足食足兵何待三年可使有勇坐令四國罔不畏威即拜優恩以彰成績顧惟不敏實仰髙風欽頌之誠叙言曷究代王漕賀馮提舉伏審光膺詔綍榮擁使軺蔚為多士之依歸允副一時之遴選國家遭時定制稽古建官賓興賢能周鄉師之分職循行郡國漢博士之觀風無非慎簡於宗儒於以肅将於使指恭惟某人士林擢秀學海資深絳帳横經已變貴逰之習綉衣持節更恢化育之功矧夫大河以東全晋之地文學宗子夏之富經術推仲淹之窮今古相望頋流風之未冺庠序之教方盛世之所先佇觀輶軒之行一闡泮宫之化異人間出髦士攸宜頋寔譾材叨同大部偶攝官而承乏徒盡瘁以在公况綜衆務之非専焉有舊政之可告仰髙滋乆瞻徳未遑傾頌之私敷宣㒺究代呉提學見執政呉以越職言事罷學事剡章失當自抵刑書議罰從寛止還銓部罪深責淺恩重命輕伏念某樗櫟散材乆知無用斗筲小器終媿昜盈頃新三舎之文誤膺一介之使雖更異志不負初心蓽路籃輿寕有辭於䟦履雲章奎畫每相戒以遵承而識慮不通矜持太過謂𣙜酤之職有添助之酒錢攝邑於時寔管鈎於學事既違明詔輙擾細民知而弗言罪恐不免殊不思法嚴分守事有司存過計私憂乃至為虵而畫足侵官離局幾同越爼以代庖况有常刑著之甲令荐頒睿㫖申警官聨言在耳以未忘罪擢髪而莫數伏䝉某人深通下志明燭事㣲察其所言盖止㳂於循習憐其所犯在奉法於丁寕姑爾薄懲以為大戒退慙昏昧上玷使令於學校興盛而罹失伍之誅方朝廷清明而預黜幽之罰杜門引咎有愧友朋引鑑照形可憎面目某惟當追循徃𤯝祗服厚恩未廹桑榆儻前愆之可贖誓鞭駑馬庶後效之是圖代呉提舉再領學司謝監司伏奉詔條申嚴學政承誤恩之下逮傃舊部以来歸倒指半年僅如前日舉頭全晋恍若故鄉顧疲懦之無堪識吹嘘之有自兹盖伏遇某人衷誠許國内恕及人樂與一方之秀民馴臻三代之美俗留情泮水盖常言必稱之加意子衿謂是政所先者按行所至奨借寔多肆令澄汰之餘復董賔興之盛眷河之左俗號少文建學以来士稍知化必将逺期之嵗月始能仰副於朝廷豈兹㣲才可覬成效所幸同舟而濟適獲所依願分隣室之光以資不逮望風良切瞻徳未皇傾頌之私敷宣罔既謝免省比年課藝幸據上㳺今日程文復叨優等爰充名於桂籍行待問於楓廷得非所宜愧不能稱竊以先王育材於學本以取人君子修善於身固将從政惟所用出於所教故能言必也能行詩書所稱豈有異致公卿之選悉由此途凡其一時出長入治之庶官莫非六卿時書嵗攷之多士待以積乆取之盡公斯民所以直道而行在昔稱為至治之極降及後世溺於末流以六藝為繁文謂上庠非急務太常受業徒評平日之空言列郡應書盡出臨時之私意上之所求㡬於無用下之所學亦非可行不知撡縵之為安烏有畫餅之可食曠矣千載循乎一途此衰世之軌所以相㝷而聖人之道未知能復恭惟國家承百年之積弊恢七世之大猷泛觀古今洞見根本謂兩漢而下所以失由觀人以一日之長而三代之治所由興盖入學有中年之攷乃闢黌舎以来俊英増弟子之千員頒新書之萬卷春誦夏絃而經以師授月書季考而士由舎升既考之於㝷常復試之於倉卒且環橋者億萬不已多乎及揚觯之再三僅有存者故自元豐之肇造迄乎紹聖之纉承雖有求者累年於兹而所得者数人而已宜獲異材之間出以彰新法之大成如某智不適時學方為已徒以雙親孝飬未忘干祿之心三舎序升式重興賢之禮俛首百試旅身七年幾成上考之功猶属中變之法頃造公選再程斐文言實工於前時名亦玷於異等知其非幸許以從新方虞再鼔而衰甘為殿後不謂適矢復沓優入彀中退慙毁瓦之無功進喜望雲之有日蹟其所自敢不知歸兹盖伏遇某人云云頃膺明命兩董學官幸升夫子之堂獲就諸生之列参乎未達方求一道之歸偃也何如或許片言之是待以殊等出於衆人雖華塗浸進於台司而雅意不忘於璧水龍門益峻猶許再登駑馬方疲幸叨一顧繋餘光之下庇使朽質以生榮故於選掄誤被收錄力探聖賢之閫域誓窮師友之淵源謝王漕舉改官孺文論舊方有賴於二天北海薦賢謬見推於一鶚顧藝能之無取辱聲聞之過情豈其所宜祗足為媿竊以保舉之法古稱至公請託之私今為後患以言故不若親之近以論才不若勢之嚴捨此二端未知一可倘非大賢之特達自拔流俗之卑汚肯為清朝舉一寒士如某者服疇冷族佔畢腐儒頃緣三舍之諸生擢預外臺之属吏芙蓉泛水幸厠英流松栢成林獨慙弱植坐見飛黄之騰踏分甘斥鷃之翺翔自知非才毎以無怨矧泮宫之長育具宸筆之丁寕官各攸司顧簡書之可畏言非有補用掾属以何為提空師以焉歸傃舊巢而是託左車餘虜曷足與謀管仲困時固多不利所宜剡章而薄責乃復借譽以片言豈有淺能可希寸進此盖伏遇某人秉心近厚立行有常范叔甚貧嘗有一日之雅而晏嬰雖乆不忘平生之言曲憐留滯之餘加畀吹嘘之末其為賜也不已多乎某敢不祇服官箴益修士檢至所未至聞所未聞非曰能之倘遂古人之志可無愧矣不虛國士之知謝司業改官膺門餘地雖幸登龍融帳多賢敢希薦鶚省躬有愧荷德無窮竊惟中古以来未有今日之盛即郊置學環水為池淵然道徳之流䆳矣詩書之府維時宗匠作我主盟凡厥抱材咸希推轂矧庀司於魯泮悉𨽻籍於虞庠顧乏偉人以光清舉如某者門䦨棄物湖海散材偶縁三舍之諸生擢預外臺之属吏追随使命幾疲汾晋之山川寤寐師承徒夢辟雍之鐘鼓每惟踈逖乆此棄捐命職自天人孰為地不謂大賢之特達曲憐小邑之遐遺借以片言俾之寸進兹盖伏遇某人善惟引類美務成人謂其少學藝文誤中程於上客雅知規矩嘗侍席於先生曲矜留滯之餘加畀吹噓之末其為賜也不已多乎某敢不益進初心力修舊學逺探聖賢之㫖趣上承師友之淵源非曰能之倘遂古人之志可無愧矣不虚君子之知謝葉博士烏府偹員方慙非據螭㘭庀職敢幸見收諒難惬於師言已追還於成命過䝉矜恤預賜褒揚義不敢當愧無以䖏儻慿餘庇之及獲安舊職之常荷徳實多叙言奚究嵗云暮矣物不終窮賢者履之福将自至佇膺異數式慰鄙懐劉左史集巻一

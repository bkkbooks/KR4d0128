body:
  text: 劉左史集别集類二宋提要臣等謹案劉左史集四巻宋劉安節撰安節字元承永嘉人元符三年進士官至起居郎擢太常少卿出知饒州遷知宣州卒于官是集不知何人所編前有留元剛序標題雖稱劉左史而其文始終以周行已劉安上與安節並稱謂之三先生又祗言其氣節而無一字及文集莫之詳也其集編次頗無法首以奏議次以表次以疏狀是矣而以功徳疏入之疏狀則為失倫又次以應酬諸啓在墓銘之前又次以祭文青詞冠經義論䇿之前則顛倒尤甚終以漁樵問對其名與世傳邵子書同核其文亦皆相同考晁公武讀書志曰漁樵問對一巻邵雍撰設為問荅以論陰陽化育之端性命道徳之奥云邵氏言其祖之書也當考云云則漁樵問對有謂出自邵子者有謂出自邵子之祖者均不云安節所撰不知何以編入集中然以太極圖歸鶴林寺僧夀涯以先天圖歸華山道士陳搏儒者皆齗齗爭之以此書歸于安節而儒者未嘗駁其非或亦疑以傳疑歟安節出伊川程子之門其生平本末畧見附録上蔡語録三則及許景衡所作祭文墓誌中其文章亦明白質實不失為儒者之言經義尤為條暢葢當時太學程試之作後来八比之權輿也凡周禮十一篇論語三篇孟子二篇中庸一篇其中庸一篇介孟子二篇之中葢繕寫者偶失其次周禮第四篇前缺四行以文義考之其題當為時見曰會其佚文三行則不可復補矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀劉左史集原序元祐紹聖間程先生講道伊洛東南之士多從之㳺而為永嘉倡者太學博士周公起居郎給事中二劉公也嗟夫人不可不知學學不可不知道世之口先王行市人者其誰曰不知學哉學而不至道文章字句之間聲音笑貌之末外浮而内不實言出而行不逮非學也假學以文姦飾學以欺人者也是其自媒寵利與俱齊汩耳禍福得䘮之衝安有所存者邪夷考三公之出處時右新學違而之他甘心擯黜曽是師伊川為茍賤乎阻鄒志完於譸張旁出之時挫蔡京於熖勢方張之日不移不詘何恃能爾講學之功大矣不然以位達以文名前後相望也而學者於三公則祠遺像而矜式誦空言而則慕亦反其本而已矣留元剛序

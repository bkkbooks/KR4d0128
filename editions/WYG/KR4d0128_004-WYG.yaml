body:
  text: 劉左史集巻四宋劉安節撰䇿兵昔衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也夫以孔子之聖豈容軍旅之不知然而云爾者所以救靈公好戰之弊也後世學者遂以謂學者之道專事爼豆之間豈不妄哉昔者季氏問於冉有曰子之知戰學於夫子耶性之耶冉有曰即學於夫子者也夫子固未嘗言兵冉有孰從而學之盖文武之道非有二也一理而已儒者明乎一理之變以接萬事之散殊平居無事晏然自若卒然有變則亦何異乎揖遜之間而左右周旋以應之耶夫武事之於儒特其政事之一爾求之仲尼之門冉有季路其人也孰謂仲尼之徒不學之乎仲尼之徒未嘗不知兵不知兵者不足為仲尼之徒苐不若後世之譎爾大抵天下之政自有常理好戰非也忘戰亦非也好戰之甚傷財害民其弊也常至於忘戰忘戰之甚飬㓂遺患其弊也常至於好戰此勢之自然所不能已者是以聖人未嘗去兵亦未嘗好戰顧其所以為天下之具不得不偹以待不虞之變爾後世之學聖人者乃或不然甚者抗兵相加暴骨平野以快一時之憤否則棄去武偹以召不測之祸此皆非得為兵之大勢者也若夫或攻或守或進或退或示之竒或示之正此特在臨機制變之間爾可預言哉趙括能讀父書而不免長平之敗房琯用古車戰而有陳濤之奔此輕言兵者也是故古之善言兵者必先觀天下之大勢而後議攻守之術不知勢而議攻守一邉吏之事而已何足為君子道哉儒生之言近於迂濶然乆而不勝其利惟執事者擇焉君臣同心䝉嘗觀文王之畫卦然後知君子小人之道分矣其畫竒者陽也君子之象也其畫耦者隂也小人之象也君子之心主於義義則周周則一是以陽畫似之小人之心主於利利則比比則貳是以隂畫似之一故同心恊徳貳故狥私阿黨同心者治狥私者亂此泰否之名所為分也雖然君子固同心也而不能使其類必用於朝廷小人固狥私也而不能使其類必退於草野盖徳者我也而用不用者君也故欲有同心之臣必先有一徳之君乾之九五曰飛龍在天利見大人而孔子釋之曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也夫欲平治天下則必生大有為之君以為之先有大有為之君必有一徳之臣以為之助類之相感所必至者也是以堯舜為之君斯有禹臯陶之徒同寅恊恭以為之臣故唐虞以帝成湯文武為之君斯有伊尹周公之徒一心一徳以為之臣故啇周以王觀其一時君臣相與以義圖治之盛也有一新命必再拜而遜之有一昌言必再拜而師之有事則相戒以不怠成功則相推而不居周公則曰帷汝奭召公則曰惟我公一唱一和相應如響若七十二子之於孔門欣欣愉愉無有異志必期於輔成而後已嗚呼盛哉是豈禹稷臯陶益契周召之徒所能至於是與盖唐虞三代之君實有義以使之爾方是時也伯鯀方命而圮族共工静言而庸違管蔡之徒挾三監而並起其小人之異意思以讒説流言以惑其君者亦有之矣夫惟其君始察而終信之是以稷契周召之徒得以同心而共理以賛其君於帝王之盛詩書所載後世無加焉天錫我宋主上以堯舜禹湯文武之徳龍飛於九五之位兢兢業業日念至治遂拔一二大臣而用之此正稷契臯陶周召之徒利見大人之時也而廟堂大臣又思所以一志恊謀上副吾君願治之意旁招俊彦列於庶官可謂合於泰之彚征君子在内而一心謀治以承功勲者矣承學之士智慮淺末不足以窺測萬一竊嘗讀書見堯舜三代之盛其君之所以任臣其臣之所以事君意其無以過於今日謹因明問誦書以為獻焉昔者舜之命九官也既各任之以其職矣復戒之曰同寅恊恭和衷哉夫以禹稷之相汲引宜其異意無有也而舜猶戒之故禹得以暨益而奏鮮食暨稷而奏艱食雖殛父而興子而君臣相信而不疑此人君求治之至誠而相戒之著者也是唐虞之所以治也昔者周公之為師也召公之為保也而召公不説夫召公豈疑周公哉以成王中材之主而承難繼之業所以憂之也故周公作君奭以諭之至舉成王文王皆有臣鄰恊力之助期於相勉以輔成王治故其卒也周道以興此大臣求治之至誠收相勉之效者也是周之所以治也夫唐虞三代之治一本於君臣之相戒如此則為今日獻策姑舉諸典謨訓誥之文以陳之而已矣若夫漢唐黨錮之事此則不知戒者之禍也䝉故不敢道焉州郡立學皆置學官愚嘗謂三舍之法視賔興為不足視科舉為有餘何以言之賓興之法詳於行而略於言三舍之法詳於言而略於行則取人以言者不若行之為愈也三舍之法屡試而後補科舉之法一試而得之則取人以暫者不若乆之為愈也昔者先皇帝将欲化成人才以須後日之用乃行三舍法於太學是豈茍欲救當世之弊而以成周之制為不可盡行於今日哉盖嘗聞唐太宗之言曰不井田則周公之制不可行也井田立故貧富無相臨之勢是以公道行焉井田廢則貧富有競利之心是以私道行焉公道行者是非得真私道行者是非失正然則鄉舉里選之制後世其不可復矣必欲捨衆人之私心而一取公於法則三舍之制其賢於科舉不亦逺乎故自元豐以来尤所注意天下之士望風鱗集争趨禮義之化以幸此日之難遇者盖肩相摩而足相躡也雖然三舍之法行於太學而太學之員才二千餘爾逺方之地距京師者或數千里而後就學於此天下之士不可勝計而就學限以二年則教飬之道無乃或未廣乎道不廣則擇之也不博擇不博則取之也不精此明問所以欲郡立其學學立其官而下問於諸生也愚雖不敏切願布一二焉昔者呉起嚙母臂以請從師於㑹子曽子薄之陽城為國子司業一日令於諸生去而覲親者盖不啻數千人夫學所以學為忠與孝也今也太學之制告假者限之一年而預上舍者必終嵗而後可得竊恐有孝如何蕃者有不得預兹選矣昔者仲尼設科於魯從之者盖三千人至於七十二弟子之列則魯人居其半其次莫如齊衛魯之鄰國也夫裹粮千里以從師古人之能事也而他國之士從師於孔子猶未若齊衛之盛况乎四方之士逺京師者或數千里終嵗聚糧尚懼不繼則雖有賢如原憲者切恐不能自致於太學矣故為今之計者莫若推三舍之法以行於天下使近者不得抱羇旅之戚而逺者亦得承誘掖之化顧不善哉若夫欲無勞民費財牽制不可為之勢愚願循舊制欲考察徳行道藝而進之得其當愚願明賞罰何謂循舊制州縣之間必有學焉因之可也其或士徒鮮少數不滿百併之可也如必路立之學則一路之士固已多矣斥大黌舍則為擾民併逺就近則為勞士必郡立之學則僻陋之邦士固少矣建置官師則為具位士徒不足無以充選故莫若酌其員數之多寡因其黌舍之廣狭可因則因可併則併則勞民費財非所患也何謂明賞罰曰三舍之行利害繋焉茍欲趨利何所不至權行貴胄有請託之私千金之子多假借之偽私偽並行而望進退之當盖亦難矣故莫若嚴其大法而略其細文大法嚴則循私者不得逞細文略則好争者不得肆夫如是則考察不審非所患也行之於先既不為擾民考之於後又足以得士然後逓而升之於太學則降一等以取之是亦自鄉升之司徒之遺意也行之数年愚将見窮荒僻陋之壌亦将誾誾然濟濟然無以異於輦轂之下矣惟執事者以人才為念而為上陳其説焉則天下學者幸甚名節愚嘗評天下之節有二槩焉有上節者有下節者昔者孟軻飬浩然之氣以遊乎齊梁之間談帝王論仁義雖其君不説至於怫然變色方且雍容閒暇請以正對而不可奪此節之上者也冉有仲由親受業於聖人可謂知義矣而顓臾之伐力不能救乃從而飾之曰夫子欲之而已果欲之而得不為之救乎其後由雖死於孔悝之難然亦不中節矣此節之下者也噫節義者君子之大致人君所恃以維持天下國家者也上節如孟軻古人所謂豪傑之士不可多得者也下節如仲由盖自衆人而下多有之必欲進其所長救其所短以至於大全盖亦為之勸沮之方而已何則中人之性進之則上排之則下進之可使盗跖為伯夷排之可使伯夷為盗跖此勢之必致者也胡不觀兩漢之間乎西漢之士非固不好義也而挺名節者一何少耶排之故也東漢之士非固好義也而挺名節者又何多耶進之故也盖嘗考髙祖以馬上得天下首喜功名而薄仁義士之自好者固已遁商山而不出矣逮至孝武所謂好儒者也奈何強明自任恥於見屈一時賢士誅戮殆盡其間獲全以終其身者類不過乎公孫𢎞石慶之順從而止爾東方朔司馬相如之談諧而止爾其君所上如此幾何不使天下之士崇勢利而羞仁義者乎故自元成以来亷節道塞學士大夫包羞含垢俛首於下執事以幸升斗之祿薾然無復自喜之氣雖賢如揚雄者猶幾於不免况餘人乎是以姦雄之徒無復畏惮得以談笑而攘之蹟其所以致此豈特恭顯數君之罪哉抑髙祖孝武有以抑之於其初而然耳光武之興也列侯名将相與戮力以成一代之業者有若冦鄧耿賈之儔其豐功偉績有足褒重者固亦多矣不此之頋而獨勤勤以身先於故人之子陵而又侯湛卓茂之徒亦非素有顯顯之功也一旦加之列侯之上曽不少貳於是天下曉然知勢利之為卑而道徳之為尊矣更相崇尚遂以成俗雖歴世以逺而其風不衰下至於懦夫孺子忠義所發猶有甘心於膏鈇烹鼎而不悔者而况耿介者乎漢祚雖已衰微而姦雄熟視不敢竊發誠以仁人義士所與掖持者甚衆故也蹟其所以致此又豈獨陳蕃數君之力哉亦光武有以進之於初而然爾大抵人性靡常惟君所尚其開端也曽不出於旦暮之間及其成效也乃在乎數十世之後不可不察也然則為今計者奈何亦稽諸兩漢而已稽西漢所以失則柔媚之徒沮之可也稽東漢所以得其亷節之士勸之可也何謂勸曰亷節之士介然自守彼其視夏畦之勞若去烈火猶懼不速其肯脅肩諂笑以自媚於人哉不用於朝則亦去之山林而止耳為政者必得若人而用之優之爵祿崇之名譽豈徒忠直之言日聞於上而天下之士亦将欣然慕奮然從而日趨於禮義之域矣何謂沮曰諂媚之士望風希㫖以求合乎上者直志於得而已無恤其他也曰然亦然吾不知其寔然乎否也曰不然亦不然吾不知其寔不然乎否也上之人一不得其情而遂用之則今日之然又轉将為他日之不然矣必在察其情稽其事騐之以所與徃䆒之以所從來則信誕見矣其不信者薄加擯斥示不復用而貪得之士亦奚肯捨所守而犯所禁哉此勸沮之方也雖然天下固有所謂豪傑之士招不來麾不去如孟軻之自信者矣殆非勸沮之所能動也茍非其人則必畏誅而慕賞人皆畏誅而慕賞則吾勸沮之道行矣及其乆也漸以成風則天下之士又将有不待賞而勸不待誅而沮者觀東漢之季士有不畏朝廷之誅戮而畏天下之清議者此又其效素所較然者也今也誠能本之學校以鼓舞之而輔以勸沮之法愚將見在位之人皆節儉正直有如文王之時者矣區區黨錮之餘又何足道用人古之制爵祿也五等公也孤也卿也大夫也士也先王豈以是等級天下之士哉以其徳不足公也故命之以為孤以其徳不足於孤也故命之以為卿以其徳不足於卿也故命之以為大夫以其徳不足於大夫也故命之以為士其貴承於天子而無嫌其徳大也其賤列於下士而非屈其徳小也夫小徳之於大徳相去逺矣求小徳於衆也猶什伯也求大徳於小徳猶千萬也是以古者天子之制三公九卿二十七大夫八十一元士其中下士之數則以萬計豈不以徳愈大而求愈難徳愈小而求愈易哉孔子曰才難不其然乎夫公者止於三而已猶曰無其徳則闕之况孤卿乎然孤卿之才則不若三公為難者也故自古以來未之敢闕惟其不闕而又當其才此古治所以為可尚也文王之時小大之才皆可用而棫樸之詩作薪之槱之是也宣王之時小大之才採之有餘而采芑之詩作薄言采芑是也夫才之大者為難得也而文王宣王之世獨取盈焉豈非教飬而然乎我國家以庠序飬天下之士求之經術擇之師儒所以作成人才之意固已進乎宣而肩乎文矣固宜濟濟多士溢於今日公卿之才取足而有餘而乃廟堂之上毎以乏才為憂侍從之列省寺之官闕者幾半乆而未補此議者不得不致疑於斯焉愚嘗思其故矣朝廷以資格取天下之常才以薦舉待天下豪傑之士處於下列固有之矣而試之未詳知之未盡亦未之敢舉也故必擇其優為之者然後敢用求於適足而已此君子慎名器之道也奈何前日異意之人臣悉以擯斥是皆出於大臣侍從之列也斥者既退矣而欲用者尚試之未詳也是其所以闕員者乎孔子曰犂牛之子騂且角雖欲勿用山川其舍諸此言才之難也又曰舉爾所知爾所不知人其舍諸此言舉才之道也夫自侍從以至於省臺寺監之官其員衆矣吾君獨能盡知之乎是有頼於吾相也吾相亦獨能盡知之乎是有頼於侍從之臣也昔唐太宗謂房杜曰僕射所以助朕廣耳目訪求賢才者也比聞日閲訟數百豈暇求人哉乃勅細事属左右丞大事關僕射夫閲訟事之小者也一訟或失在一事爾而擇人一失其敗事豈不多乎姚崇嘗擬郎吏於𤣥宗𤣥宗不主其語乃曰大事吾與辦除郎吏小事爾顧崇不能重煩我耶夫擇人任官真宰相之任也以謂百執事之衆不足以徧知亦使侍從省寺之臣薦其才而已陸贄語於徳宗曰左右丞郎中御史大夫中丞逹官也陛下擇宰相而不擇天下之才可耶栁渾亦曰陛下當擇臣等以輔聖徳臣等當擇京兆尹以𢎞大化尹當擇令以親細事夫才之難也乆矣誠以一人之明不足以徧知天下之賢則亦上下相委以廣求之之道也巳所不知人其知之矣必欲懲妄舉之失則察之可也孟子曰諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫故察之見賢焉然後用特在吾君吾相而已昔前所降之詔許侍從之臣各舉爾所知以應任使者正為時擇才之大法也鄙生無知姑叙所聞焉雜著漁樵問對漁者垂鈎於伊水之上樵者過之㢮擔息肩坐於盤石之上而問於漁者曰魚可釣取乎曰然非餌可乎曰否非釣也餌也魚利食而見害人利魚而䝉利其利同也其害異也敢問何故漁者曰子樵者也與吾異治安得侵吾事乎然亦可以與子試為言之彼之利猶此之利也彼之害亦猶此之害也子知其小未知其大魚之利食吾亦利乎食也魚之害食吾亦害乎食也以魚之一身當人之一食則魚之害多矣以人之一身當魚之一食則人之害亦多矣魚利乎水人利乎陸水與陸異其利一也魚害乎餌人害乎財餌與財異其害一也又何必分乎彼此哉子之言體也獨不知用耳樵者又問曰魚待烹而食必吾薪濟之乎曰然子知薪能濟吾之魚不知子之薪所以濟吾之魚也薪之能濟魚也乆矣不待子而後知茍未知火之能用薪則子之薪雖積丘山獨且奈何哉樵者曰火之功大於薪固知之矣敢問水曰火之性能迎而不能随故㓕水之性能随而不能迎故熱是故有温泉而無寒火火以用為本以體為末水以體為本以用為末是故能濟又能相息非獨水火則然天下之事皆然在乎用之何如爾樵者曰用可得聞乎曰可以意得者物之性也可以言傳者物之情也可以象求者物之形也可以數取者物之體也用也者妙萬物而言者也可以意得而不可以言傳曰不可以言傳則子惡得而知之乎曰吾所以得而知之者固不能以言傳非獨吾不能傳之以言聖人亦不能傳之以言也曰聖人既不能傳之以言則六經非言也耶曰時然後言何言之有樵者賛曰天地之道偹乎人萬物之道偹乎身衆妙之道偹乎神天下之能畢矣又何思何慮吾今而後知事天踐形之為大不及子之門則幾至乎殆矣乃析薪烹魚而食之飫而論易漁者與樵者遊於伊水之上漁者嘆曰熈熈乎萬物之多而未始有雜吾知遊乎天地之間萬物皆可以無心而致之矣非子則吾孰與歸焉樵者曰敢問無心致天地萬物之方漁者曰無心者無意之謂也無意之意不我物也不我物然後能物物曰何謂我何謂物曰以我狥物則我亦物也以物狥我則物亦我也我物皆致意由是明天地亦萬物也何天地之有焉萬物亦天地也何萬物之有焉萬物亦我也亦何萬物之有焉我亦萬物也何我之有焉何物不我何我不物如是則可以宰天地可以司鬼神而况於人乎况於物乎樵者問漁者曰天何依曰依乎地地何附曰附乎天曰然則天地何依何附曰有何依附天依形地附氣其形也有涯其氣也無涯有無之相生形氣之相息終則有始終始之間其天地之所存乎天以用為本以體為末地以體為本以用為末利用出入之謂神名體有無之謂聖惟神與聖為能参乎天地者也小人則日用而不知故有害生實䘮之患夫名也者實之賓也利也者害之主也名生於不足利䘮於有餘害生於有餘實䘮於不足此理之常也飬身者必以利貪夫則以身狥利故有害生焉立身者必以名衆人則以身狥名故有實䘮焉凡言朝者萃名之所也市者聚利之地也能不以争處乎其間何害生實䘮之有耶利至則害生名興則實䘮利至名興而無害生實䘮之患惟有徳者能之樵者問漁者曰子以何道而得魚曰吾以六物具而得魚曰六物具也豈由天乎具六物而得魚者人也具六物而所以得魚者非人也樵者未達請問其方漁者曰六物者竿也綸也浮也沉也鈎也餌也一不具則魚不可得然而六物具而不得魚者非人也六物具而不得魚者有焉未有六物不具而得魚者也是故具六物者人也得魚與不得魚者天也六物不具而不得魚者非天也人也樵者曰人有禱鬼神而求福者福可禱而求耶求之而可得耶敢問其所以曰語善惡者人也福禍者天也天道福善而禍滛鬼神其能違天乎自作之咎固難逃已天降之災禳之奚益修徳積善君子常分安有餘事於其間哉樵者曰有為善遇禍有為惡獲福者何也漁者曰有幸與不幸也幸不幸命也常不常分也一命一分人其可逃乎曰何謂分何謂命曰小人之遇福非分也命也常禍分也非命也君子之遇禍非分也命也常福分也非命也漁者謂樵者曰人之所謂親莫如父子也人之所謂踈莫如路人也利害在心則父子過路人逺矣父子之道天性也利害猶或奪之况非天性乎夫利害之移人如是之深也可不慎乎路人之相逢則過之固無利害之心焉無利害在前故也有利害在前則路人與父子又奚擇焉路人之能相交以義又何况父子之親乎夫義者譲之本也利者争之端也譲則有仁争則有害仁與害何相去之逺也堯舜亦人也桀紂亦人也人與人同而仁與害異爾仁因義而起害由利而生利不以義則臣弑其君者有焉子弑其父者有焉豈若路人之相逢一日而交袂於中逵者哉樵者謂漁者曰吾嘗負薪矣舉百斤而無傷吾之身加十斤則遂傷吾乏身敢問何故漁者曰樵則吾不知之矣以吾之事觀之則易地皆然吾嘗釣而得大魚與吾交戰欲棄之則不能舍欲取之則不能勝終日而後獲幾有沒溺之患矣豈直有傷身之患耶魚與薪異也其貪而為傷則一也百斤力分之内者也十斤力分之外者也力分之外雖一毫猶且為害而况十斤乎吾之貪魚亦何異子之貪薪乎樵者嘆曰吾今而後知量力而動者智矣哉樵者謂漁者曰子可謂知易之道矣敢問易有太極何物也曰無為之本也太極生兩儀天地之謂乎曰兩儀天地之祖也非止天地而已也太極分而為二先得一為一後得一為二一二之謂兩儀曰兩儀生四象何物也曰四象謂隂陽剛柔有隂陽然後可以生天有剛柔然後可以生地立道之本於斯為極曰四象生八卦八卦何謂也曰乾坤離坎兊艮震巽之謂也迭相盛衰終始於其間矣因而重之則六十四由是而生也而易之道始偹矣樵者問漁者曰復何以見天地之心乎曰先陽已盡後陽始生大則天地始生之際中則當日月始周之際末則當星辰始終之際萬物死生寒暑代謝晝夜變遷非此無以見之當天地窮極之所必變變則通通則乆故象言先王以至日閉闋商旅不行后不省方順天故也樵者謂漁者曰旡妄災也敢問其故曰妄則欺也得之必有禍斯有妄也順天而動有禍及者非禍也猶農夫有思豐而不勤稼穡者其荒也不亦禍乎農有勤稼穡而復敗諸水旱者其荒也不亦灾乎故象言先王以茂對時育萬物貴不妄也附錄上蔡先生語錄凡三事元承曰誠意積於中者既厚則感動於外者亦深故伯淳所在臨政上下自然響應或問劉子進乎曰未見他有進處所以不進者何只為未有根因指庭前􅙐醾曰此花只為有根故一年長盛如一年何以見他進未有進處不道全不進只他守得定不變却亦早是好手如麋仲之徒皆忘却了昔從明道伊川學者多有語錄二劉各錄得數冊髙閌伊洛辨伊川先生議論不事文采豈有意於傳逺哉然猶班班可考者以有劉元承之徒口為傳授故也許右丞祭左史文公㳺太學我亦諸生我䝉召還公在朝廷僦舎國南門巷相望把酒道舊其喜洋洋嗟我昏䝉惟公之畏公不我鄙委曲教誨廣大精㣲我駭且疑公指其要莫先致知用舍行藏我亦公告公曰有命豈不自好取别阪堤嵗月如馳公徃不還而以䘮歸大車夷涂發軔千里伊誰柅之而止於此公之道學我寔銘之匪告於今維後之貽公𦵏荆州千夫臨穴而我何為薄祿羈紲絮酒寓辭以冩契素瞻彼大江日夜東注墓誌有宋承議郎權發遣宣州軍州管勾學事兼管内勸農桑事借紫金魚袋劉公卒於州之正寢其弟安上安禮䕶其柩歸卜以卒之二年二月壬子𦵏於所居永嘉縣仙桂鄉之外彎山郡人戴迅狀其州里世次道學歴官行事之實而安上問銘於横塘許景衡景衡曰墓有銘非古也旂常彛鼎著人功善以示不忘今不復用則賢人君子可傳於後世者殆将冺然矣無已則銘乎恭惟劉氏系出彭城其家於温也乆矣大父諱瑩積善有隂施識者知其後必昌大父諱弢以公恩封宣義郎公諱安節字元承資禀不凡方兒時已有逺度比長嗜學有所未達思之夜以繼日必至於得而後已少與從父弟今徽猷待制安上相友愛皆以文行為士友所推稱既冠聨薦於鄉同㳺太學秀出諸生間號二劉一時賢士大夫皆慕與之友而宗工名儒見其文聞其為人皆嘆服元符三年擢進士調越州諸暨縣主簿國子祭酒率其屬表留公太學不報除萊州州學教授未行改河東提舉學事司管勾文字乆之同時學校者皆進顯於朝廷獨公奔走小官未嘗為進取謀議者惜之改宣徳郎受代來歸當天子厲精庶政之日孜孜賢俊求之如不及宰相以公名聞有㫖召對便殿公言春宫宜慎擇官屬雖左右趨走者必惟其人又論節儉及君子小人和同之異上稱善顧問甚悉即日擢為監察御史數决大獄所平反甚衆居數月攝殿中侍御史士論翕然稱得人公之為察官也謁告省親於鄉亦既陛辭矣而殿中命下故不供職而歸俄除起居郎有㫖趣赴關公迎宣義而西居無何宣義思歸公欲乞外補宣義固止之以為朝廷厚恩宜修職報效且吾志安於閭里事親者務孝其志可也公遂不敢言明年除太常少卿而言者斥公在言責時無所建明且乆不寕親責守饒州州洊饑公至大發廪振之又檄旁郡無遏糴軍儲不足他日皆取諸民公曰嵗饑如此重困之可乎他用宜有相通者正應調適其緩急耳市人數為在官者擾至晝日閉關或逃散郊外公躬率以亷僚屬化之乆闕守獄訟積留紀綱隳壊吏媮而民病公為䆒其本末先後䟽剔滯碍俾就條理未幾饑者以充乏者以濟逃者以復凡為民弊害者悉除去於是與之更治賦出裁制舉貢奉所湏俾屬縣先期戒民無倉卒之擾民既和樂爱戴之如父母雨晹有禱輙應人以為精誠所格也冬祀貢縑有期㑹而民未能盡輸公語其屬曰民困甚雖嚴督之亦未必辦吾其以罪去乎豪民數十人聞之曰可使我公得罪耶相與代輸之其得人心如此治聲流聞京師移知宣州去饒之日民遮留之泣涕不忍别耆夀以為州自范文正後惟吾劉公而已至宣十日水大至公公遣其屬具舟拯溺而躬督之晝夜不少休所活盖數千人而流民至者以萬數公闢佛廟以處之發廩以活之一無失所者其将發廩也吏以為法令不可而部使者亦持其議公皆不聼其後御史䟽江浙不賑濟以聞詔書切責獨宣不與焉政和六年春大疫公命醫分治甚力其得不死者不可計夏五月巳亥公得疾精爽不昧與家人語如平時至乙巳卒享年四十九吏哭於庭民哭於巷雖童稚亦知感慕而士大夫無逺近識否皆為之嘆息娶何氏同郡人愿之女封榮徳縣君公貳太常改封宜人公之娶也初行親迎之禮鄉人慕而繼之旁郡聞之駭且笑比朝廷頒五禮於天下於是人皆思公之倡始云宜人仁孝可稱人以為宜相君子者先公得疾且瘳㑹公病卒哭之不成聲後二日亦卒生子男曰暨孫有異質九嵗而夭一女尚㓜以安上之子誠為後部使者表其治績及勤民致死狀天子惻然惜其才未及盡用特命誠将仕郎公清明坦夷雅近於道嘗從當世先生長者問學始以致知格物發其材乆之存心飬性於是有得其氣貌温然望之知其有容遇人無貴賤小大一以誠雖忤巳者畧不見其怒色恚辭也其在河東同僚有交惡者一日邂逅公座聞其緒餘不覺自失相與如初其静黙弗校宜若易與者至於有所立則挺然不可回奪也聞人善如已出或歸以過未嘗辯遇事不擇劇易人所厭苦者行之裕然無廹遽勤瘁之色敏於從事區處黒白惟義之適不以禍福利害為避就鄒公浩以右正言得罪公與其所厚者數軰追路勞勉之時朝廷震怒痛治送行者追逮甚急人皆惴恐公獨泰然如平時既而哲宗察其無他有詔釋之而公亦自如也事親能承順其意教飬諸弟涵容周旋有古人所難者族居踰百口上下愛信雖臧獲無間言也常曰堯舜之道不過孝弟天下之理有一無二乃若異端則有間矣其與人逰常引其所長而隂覆其所不及諸暨令不事事州将欲易置他邑公既左右之振其綱條又稱其長者将遂善遇之宣州賑濟公疏以為非敢専也盖有所受之於是朝廷錄部使者之功而進㧞焉盖其志非敢私其身而在於為人其所施置常在於公天下以為心不如是則非所以合内外通彼我也其於窮理盡性之學方進未艾使天假之年有為於世則吾未知與古名臣為何如耳觀其為二州專以仁義教化平易近民民有訟委曲訓戒之俾無再犯間有鬬者将愬於官則曰何面目復見府公輙中輟以是廷無可治之事而或踰旬不施鞭朴其為政效見於此公之講學常攝其要使人廓然知聖賢塗轍可望而進而景衡也寔與切磋之益今銘其墓著其行事乃止於此而已盖公之潛徳隠行雖至親厚善亦不能盡知之也然因其所常言而逆其所不言以其所已為而究其所欲為庻幾後之君子有考焉是不為略也銘曰自明而誠大人學兮聖門授受其來邈兮孰溢其源末流涸兮紛紛百家益偏駁兮後學專門祗穿鑿兮上下千載嗟殘剝兮温温劉公其美璞兮斯文有傳與敦琢兮始乎致知物斯格兮沉涵充擴卒自得兮衆人巧智獨敦撲兮衆人廹隘獨恢廓兮衆人利欲獨淡泊兮洞然無碍油然樂兮造膝有陳其利博兮御史左史帝親擢兮出守二州愈民瘼兮浩浩江河裁一勺兮天命在人孰厚薄兮氣之所鍾有美惡兮㑹元孕粹良不數兮幸而得之歎㝠漠兮茫茫九原能復作兮我銘其藏尚後覺兮劉左史集巻四
